services:

  # ── Spring Boot App ───
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: orderservice-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/orderservice
      DB_USERNAME: orderservice
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      TWILIO_ENABLED: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orderservice-network
    restart: unless-stopped

  # ── PostgreSQL ────
  postgres:
    image: postgres:15-alpine
    container_name: orderservice-postgres
    environment:
      POSTGRES_DB: orderservice
      POSTGRES_USER: orderservice
      POSTGRES_PASSWORD: orderservice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orderservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderservice -d orderservice"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────
  redis:
    image: redis:7-alpine
    container_name: orderservice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - orderservice-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Mailpit───
  mailpit:
    image: axllent/mailpit:latest
    container_name: orderservice-mailpit
    ports:
      - "1025:1025"   # SMTP — app sends emails here
      - "8025:8025"   # Web UI — open http://localhost:8025 to read emails
    networks:
      - orderservice-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  orderservice-network:
    driver: bridge