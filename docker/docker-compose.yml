version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: orderservice-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=orderservice_db
      - DB_USERNAME=orderservice_user
      - DB_PASSWORD=orderservice_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production-min-32-chars
      - STRIPE_MOCK=true
      - TWILIO_MOCK=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orderservice-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: orderservice-postgres
    environment:
      POSTGRES_DB: orderservice_db
      POSTGRES_USER: orderservice_user
      POSTGRES_PASSWORD: orderservice_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderservice_user -d orderservice_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orderservice-network

  redis:
    image: redis:7-alpine
    container_name: orderservice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orderservice-network

  mailhog:
    image: mailhog/mailhog
    container_name: orderservice-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — open http://localhost:8025 to see emails
    networks:
      - orderservice-network

volumes:
  postgres_data:
  redis_data:

networks:
  orderservice-network:
    driver: bridge
