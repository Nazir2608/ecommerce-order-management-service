spring:
  datasource:
    url: jdbc:h2:mem:orderservice;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false

  mail:
    host: mailhog
    port: 1025

logging:
  level:
    com.nazir.orderservice: DEBUG
    org.springframework.security: DEBUG
features:
  cart:
    enabled: false
  admin:
    users:
      enabled: false
    orders:
      enabled: false
    products:
      enabled: false
