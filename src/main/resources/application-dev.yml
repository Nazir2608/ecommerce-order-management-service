#  DEV profile -local development

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orderservice
    driver-class-name: org.postgresql.Driver
    username: orderservice
    password: orderservice
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: localhost
    port: 1025

  thymeleaf:
    cache: false

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.nazir.orderservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG