spring:
  application:
    name: ecommerce-order-management-service

  profiles:
    active: dev

  # ── JPA shared behaviour only — dialect/ddl-auto set per profile ──────────
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ── Thymeleaf ──────────────────────────────────────────────────────────────
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  # ── Mail shared defaults ───────────────────────────────────────────────────
  mail:
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080

# ── App custom properties ───────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiry-ms: 3600000
    refresh-token-expiry-ms: 604800000

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_your_test_key_here}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}

  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}
    enabled: ${TWILIO_ENABLED:false}

  order:
    free-shipping-threshold: 100.00
    shipping-charge: 10.00
    low-stock-threshold: 10

  rate-limit:
    requests-per-minute: 100

# ── Swagger ──────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ── Logging base ─────────────────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.nazir.orderservice: INFO
    org.springframework.security: INFO