spring:
  application:
    name: ecommerce-order-management-service

  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orderservice}
    username: ${DB_USERNAME:orderservice}
    password: ${DB_PASSWORD:orderservice}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

server:
  port: 8080
  servlet:
    context-path: /

# ===== JWT =====
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiry-ms: 3600000       # 1 hour
    refresh-token-expiry-ms: 604800000    # 7 days

  # ===== STRIPE =====
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_your_test_key_here}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}

  # ===== TWILIO =====
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}
    enabled: ${TWILIO_ENABLED:false}

  # ===== BUSINESS RULES =====
  order:
    free-shipping-threshold: 100.00
    shipping-charge: 10.00
    low-stock-threshold: 10

  # ===== RATE LIMITING =====
  rate-limit:
    requests-per-minute: 100

# ===== SWAGGER =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: Orderservice API
    version: 1.0.0
    description: Production-ready Order Management System API

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ===== LOGGING =====
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.nazir.orderservice: DEBUG
    org.springframework.security: INFO
